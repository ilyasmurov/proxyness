name: Deploy Admin

on:
  push:
    tags: ["admin-*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-admin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          push: true
          build-args: |
            VITE_API_URL=https://proxyness.smurov.com
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Aeza
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -euo pipefail
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            # Pull with retries — see deploy.yml for rationale.
            PULL_OK=0
            for ATTEMPT in 1 2 3 4 5; do
              echo "[pull] attempt $ATTEMPT/5..."
              if docker pull ghcr.io/${{ github.repository }}-admin:latest; then
                PULL_OK=1; break
              fi
              sleep 30
            done
            [ "$PULL_OK" -eq 1 ] || { echo "[pull] FAILED after 5 attempts" >&2; exit 1; }
            docker stop proxyness-admin 2>/dev/null || true
            docker rm proxyness-admin 2>/dev/null || true
            docker run -d \
              --name proxyness-admin \
              --restart unless-stopped \
              -p 8081:80 \
              ghcr.io/${{ github.repository }}-admin:latest
