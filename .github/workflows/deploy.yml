name: Build and Deploy

on:
  push:
    branches: [main]
  # Manual trigger so a commit pushed with [skip-deploy] (admin UI
  # tweaks, docs, etc.) can be deployed later without having to invent
  # an empty commit just to wake the pipeline up.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Skip the whole deploy pipeline when the commit message contains
  # [skip-deploy]. Use this for docs/changelog/backlog changes that don't
  # need to restart the production server.
  #
  # The commit message is passed via env var (not direct interpolation) so
  # multi-line messages and shell metacharacters can't break the bash parser
  # or be used for command injection.
  check:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Match [skip-deploy] only on the subject line. Earlier this was a
          # substring match across the whole commit message, which meant
          # explaining the tag in the body ("this commit is NOT [skip-deploy]
          # because X") would accidentally skip the deploy — we stepped on
          # that rake exactly once and lost a restart. Subject-line-only is
          # the intended behaviour; if you really want to skip from a merge
          # commit whose subject is auto-generated, put [skip-deploy] first.
          SUBJECT=$(printf '%s' "$COMMIT_MSG" | head -n1)
          if [[ "$SUBJECT" == *"[skip-deploy]"* ]]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Commit subject contains [skip-deploy], skipping deploy"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        run: |
          cd pkg && go test ./...
          cd ../daemon && go test ./...
          cd ../test && go test -v -timeout 30s

  build-and-push:
    needs: [check, test]
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: [check, build-and-push]
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            # Create app directory
            mkdir -p /opt/proxyness

            # Login to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            # Pull latest image
            docker pull ghcr.io/${{ github.repository }}:latest

            # Stop old container — give it 5s to broadcast MsgSessionClose
            # to active UDP clients so they reconnect immediately instead of
            # hanging on the 20s keepalive timeout.
            docker stop -t 5 proxyness 2>/dev/null || true
            docker rm proxyness 2>/dev/null || true

            # Start new container
            docker run -d \
              --name proxyness \
              --restart unless-stopped \
              --ulimit nofile=32768:32768 \
              -p 443:443 \
              -p 443:443/udp \
              -v proxyness-data:/data \
              -e ADMIN_USER="${{ secrets.ADMIN_USER }}" \
              -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
              ghcr.io/${{ github.repository }}:latest \
              -addr ":443" \
              -db /data/data.db \
              -cert /data/cert.pem \
              -keyfile /data/key.pem \
              -config "http://172.17.0.1:8443"
