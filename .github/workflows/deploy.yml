name: Deploy Server

on:
  push:
    tags: ["server-*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        run: |
          cd pkg && go test ./...
          cd ../daemon && go test ./...
          cd ../test && go test -v -timeout 30s

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  deploy-aeza:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Aeza (NL)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -euo pipefail
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi
            mkdir -p /opt/proxyness
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            # Pull new image with retries. Without this the deploy used to
            # "succeed" against a stale cached image whenever Aeza upstream
            # blipped during pull (TLS handshake timeout / connection reset
            # to ghcr.io) — `docker pull` failed, the script continued, and
            # `docker run` happily restarted the OLD image. Now: 5 attempts
            # with 30s backoff, and if all fail we exit non-zero so the
            # workflow shows red and the stale-image regression is visible.
            BEFORE_DIGEST=$(docker image inspect ghcr.io/${{ github.repository }}:latest --format '{{.Id}}' 2>/dev/null || echo "none")
            PULL_OK=0
            for ATTEMPT in 1 2 3 4 5; do
              echo "[pull] attempt $ATTEMPT/5..."
              if docker pull ghcr.io/${{ github.repository }}:latest; then
                PULL_OK=1
                break
              fi
              echo "[pull] attempt $ATTEMPT failed; sleeping 30s before retry"
              sleep 30
            done
            if [ "$PULL_OK" -ne 1 ]; then
              echo "[pull] FAILED after 5 attempts — refusing to deploy stale image" >&2
              exit 1
            fi
            AFTER_DIGEST=$(docker image inspect ghcr.io/${{ github.repository }}:latest --format '{{.Id}}')
            echo "[pull] image digest: $BEFORE_DIGEST -> $AFTER_DIGEST"

            # Stop old container — give it 5s to broadcast MsgSessionClose
            # to active UDP clients so they reconnect immediately instead of
            # hanging on the 20s keepalive timeout.
            docker stop -t 5 proxyness 2>/dev/null || true
            docker rm proxyness 2>/dev/null || true
            docker run -d \
              --name proxyness \
              --restart unless-stopped \
              --ulimit nofile=32768:32768 \
              -p 4430:443 \
              -p 8443:8443/udp \
              -v proxyness-data:/data \
              --env-file /etc/proxyness/db.env \
              -e ADMIN_USER="${{ secrets.ADMIN_USER }}" \
              -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
              ghcr.io/${{ github.repository }}:latest \
              -addr ":443" \
              -cert /data/cert.pem \
              -keyfile /data/key.pem \
              -config "http://172.17.0.1:8443"
