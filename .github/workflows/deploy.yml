name: Deploy Server

on:
  push:
    tags: ["server-*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        run: |
          cd pkg && go test ./...
          cd ../daemon && go test ./...
          cd ../test && go test -v -timeout 30s

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  deploy-aeza:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Aeza (NL)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi
            mkdir -p /opt/proxyness
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:latest
            # Stop old container — give it 5s to broadcast MsgSessionClose
            # to active UDP clients so they reconnect immediately instead of
            # hanging on the 20s keepalive timeout.
            docker stop -t 5 proxyness 2>/dev/null || true
            docker rm proxyness 2>/dev/null || true
            docker run -d \
              --name proxyness \
              --restart unless-stopped \
              --ulimit nofile=32768:32768 \
              -p 4430:443 \
              -p 8443:8443/udp \
              -v proxyness-data:/data \
              --env-file /etc/proxyness/db.env \
              -e ADMIN_USER="${{ secrets.ADMIN_USER }}" \
              -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
              ghcr.io/${{ github.repository }}:latest \
              -addr ":443" \
              -cert /data/cert.pem \
              -keyfile /data/key.pem \
              -config "http://172.17.0.1:8443" \
              -peer "https://10.88.0.2:8443"

  deploy-timeweb:
    needs: [build-and-push, deploy-aeza]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Timeweb (NL)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST_TIMEWEB }}
          username: ${{ secrets.VPS_USER_TIMEWEB }}
          password: ${{ secrets.VPS_PASSWORD_TIMEWEB }}
          script: |
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:latest
            docker stop -t 5 proxyness 2>/dev/null || true
            docker rm proxyness 2>/dev/null || true
            # Timeweb uses the smurov-proxy-data volume from the prior
            # standalone deploy (pre-multi-VPS). Don't switch volumes —
            # that would drop the existing devices DB.
            # Port 443 on Timeweb host is held by taskless/Caddy, so the
            # proxy container publishes both TCP and UDP on 8443.
            docker run -d \
              --name proxyness \
              --restart unless-stopped \
              --ulimit nofile=32768:32768 \
              -p 8443:8443/tcp \
              -p 8443:8443/udp \
              -v smurov-proxy-data:/data \
              --env-file /etc/proxyness/db.env \
              -e ADMIN_USER="${{ secrets.ADMIN_USER }}" \
              -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
              ghcr.io/${{ github.repository }}:latest \
              -addr ":8443" \
              -cert /data/cert.pem \
              -keyfile /data/key.pem
