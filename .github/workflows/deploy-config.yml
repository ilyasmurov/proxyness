name: Deploy Config Service

on:
  push:
    branches: [main]
    paths:
      - "config/**"
      - "pkg/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-config

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SUBJECT=$(printf '%s' "$COMMIT_MSG" | head -n1)
          if [[ "$SUBJECT" == *"[skip-deploy]"* ]]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Commit subject contains [skip-deploy], skipping deploy"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: config/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: [check, build-and-push]
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # Login to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            # Pull latest image
            docker pull ghcr.io/${{ github.repository }}-config:latest

            # Stop and remove old container
            docker stop smurov-config 2>/dev/null || true
            docker rm smurov-config 2>/dev/null || true

            # Start new container
            docker run -d \
              --name smurov-config \
              --restart unless-stopped \
              --network host \
              -v smurov-config-data:/data \
              ghcr.io/${{ github.repository }}-config:latest \
              -addr :8443 \
              -db /data/config.db \
              -admin-user "${{ secrets.ADMIN_USER }}" \
              -admin-pass "${{ secrets.ADMIN_PASSWORD }}" \
              -proxy "https://127.0.0.1:443"
