name: Deploy Config Service

on:
  push:
    tags: ["config-*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-config

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: config/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            # Login to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            # Pull with retries — without this, transient TLS/network blips
            # to ghcr.io would silently leave the deploy on the old image.
            PULL_OK=0
            for ATTEMPT in 1 2 3 4 5; do
              echo "[pull] attempt $ATTEMPT/5..."
              if docker pull ghcr.io/${{ github.repository }}-config:latest; then
                PULL_OK=1; break
              fi
              sleep 30
            done
            [ "$PULL_OK" -eq 1 ] || { echo "[pull] FAILED after 5 attempts" >&2; exit 1; }

            # Stop and remove old container
            docker stop proxyness-config 2>/dev/null || true
            docker rm proxyness-config 2>/dev/null || true

            # Start new container
            docker run -d \
              --name proxyness-config \
              --restart unless-stopped \
              --network host \
              -v proxyness-config-data:/data \
              ghcr.io/${{ github.repository }}-config:latest \
              -addr :8443 \
              -db /data/config.db \
              -admin-user "${{ secrets.ADMIN_USER }}" \
              -admin-pass "${{ secrets.ADMIN_PASSWORD }}" \
              -proxy "https://127.0.0.1:443"
