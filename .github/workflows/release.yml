name: Build Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Windows binaries + wintun on Linux (no CGo needed)
  build-go-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build Windows binaries
        run: |
          mkdir -p resources
          cd daemon
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o ../resources/daemon-windows.exe ./cmd
          cd ../helper
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o ../resources/helper-windows.exe ./cmd

      - name: Download wintun.dll
        run: |
          curl -L https://www.wintun.net/builds/wintun-0.14.1.zip -o wintun.zip
          unzip wintun.zip
          cp wintun/bin/amd64/wintun.dll resources/wintun.dll

      - uses: actions/upload-artifact@v4
        with:
          name: go-binaries-windows
          path: resources/

  # Electron apps on macOS (builds darwin Go binaries natively for CGo support)
  build-clients:
    needs: build-go-windows
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/download-artifact@v4
        with:
          name: go-binaries-windows
          path: client/resources

      - name: Build macOS Go binaries
        run: |
          cd daemon
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -o ../client/resources/daemon-darwin-arm64 ./cmd
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o ../client/resources/daemon-darwin-amd64 ./cmd
          cd ../helper
          GOOS=darwin GOARCH=arm64 go build -o ../client/resources/helper-darwin-arm64 ./cmd
          GOOS=darwin GOARCH=amd64 go build -o ../client/resources/helper-darwin-amd64 ./cmd

      - name: Build Electron app
        run: |
          cd client
          npm install
          npm run build
          npx electron-builder --mac pkg --arm64 --publish never
          npx electron-builder --mac pkg --x64 --publish never
          npx electron-builder --win nsis --x64 --publish never

      - name: Generate latest-mac.yml
        run: |
          cd client/release
          VERSION=$(node -p "require('../package.json').version")
          ARM_PKG="SmurovProxy-${VERSION}-arm64.pkg"
          INTEL_PKG="SmurovProxy-${VERSION}.pkg"
          ARM_SHA=$(shasum -a 512 "$ARM_PKG" | awk '{print $1}' | xxd -r -p | base64)
          ARM_SIZE=$(stat -f%z "$ARM_PKG")
          INTEL_SHA=$(shasum -a 512 "$INTEL_PKG" | awk '{print $1}' | xxd -r -p | base64)
          INTEL_SIZE=$(stat -f%z "$INTEL_PKG")
          cat > latest-mac.yml <<YMEOF
          version: ${VERSION}
          files:
            - url: ${ARM_PKG}
              sha512: ${ARM_SHA}
              size: ${ARM_SIZE}
            - url: ${INTEL_PKG}
              sha512: ${INTEL_SHA}
              size: ${INTEL_SIZE}
          path: ${ARM_PKG}
          sha512: ${ARM_SHA}
          releaseDate: '$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'
          YMEOF

      - uses: actions/upload-artifact@v4
        with:
          name: installers
          path: |
            client/release/*.pkg
            client/release/*.exe
            client/release/*.yml
            client/release/*.blockmap

  deploy-to-vps:
    needs: build-clients
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: installers
          path: installers

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "installers/*"
          target: /tmp/smurov-downloads
          strip_components: 1

      - name: Move files to container volume
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            docker exec smurov-proxy sh -c "rm -rf /data/downloads && mkdir -p /data/downloads"
            for f in /tmp/smurov-downloads/*; do
              docker cp "$f" smurov-proxy:/data/downloads/
            done
            rm -rf /tmp/smurov-downloads
