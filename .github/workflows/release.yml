name: Build Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Windows binaries + wintun on Linux (no CGo needed)
  build-go-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build Windows binaries
        run: |
          mkdir -p resources
          cd daemon
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o ../resources/daemon-windows.exe ./cmd
          cd ../helper
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o ../resources/helper-windows.exe ./cmd

      - name: Download wintun.dll
        run: |
          # wintun.net is occasionally flaky with SSL_ERROR_SYSCALL — retry a
          # few times before failing the release so one hiccup doesn't kill
          # the whole build.
          for attempt in 1 2 3 4 5; do
            if curl -fL --retry 3 --retry-delay 5 --connect-timeout 15 \
                https://www.wintun.net/builds/wintun-0.14.1.zip -o wintun.zip; then
              echo "wintun download succeeded on attempt $attempt"
              break
            fi
            echo "wintun download failed on attempt $attempt, retrying..."
            sleep 10
          done
          test -s wintun.zip || { echo "wintun download exhausted all retries"; exit 1; }
          unzip wintun.zip
          cp wintun/bin/amd64/wintun.dll resources/wintun.dll

      - uses: actions/upload-artifact@v4
        with:
          name: go-binaries-windows
          path: resources/

  # Electron apps on macOS (builds darwin Go binaries natively for CGo support)
  build-clients:
    needs: build-go-windows
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/download-artifact@v4
        with:
          name: go-binaries-windows
          path: client/resources

      - name: Build macOS Go binaries
        run: |
          cd daemon
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -o ../client/resources/daemon-darwin-arm64 ./cmd
          cd ../helper
          GOOS=darwin GOARCH=arm64 go build -o ../client/resources/helper-darwin-arm64 ./cmd

      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd client && npm version "$VERSION" --no-git-tag-version

      - name: Build Electron app
        run: |
          cd client
          npm install
          npm run build
          npx electron-builder --mac pkg --arm64 --publish never
          npx electron-builder --win nsis --x64 --publish never

      - name: Generate latest-mac.yml
        run: |
          cd client/release
          VERSION=$(node -p "require('../package.json').version")
          PKG="Proxyness-${VERSION}-arm64.pkg"
          SHA=$(shasum -a 512 "$PKG" | awk '{print $1}' | xxd -r -p | base64)
          SIZE=$(stat -f%z "$PKG")
          cat > latest-mac.yml <<YMEOF
          version: ${VERSION}
          files:
            - url: ${PKG}
              sha512: ${SHA}
              size: ${SIZE}
          path: ${PKG}
          sha512: ${SHA}
          releaseDate: '$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'
          YMEOF

      - uses: actions/upload-artifact@v4
        with:
          name: installers
          path: |
            client/release/*.pkg
            client/release/*.exe
            client/release/*.yml
            client/release/*.blockmap

  create-release:
    needs: build-clients
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: installers
          path: installers

      - name: Clean up existing release for this tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Re-tagging creates duplicate releases. Delete any existing ones
          # for this tag so download counts start fresh and no drafts linger.
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag=false 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Pre-release tags use semver suffix: v1.29.4-beta.1, v1.29.4-rc.2,
          # v1.29.4-alpha.3. --prerelease keeps them out of releases/latest so
          # stable clients polling latest.yml never see them; testers install
          # the .exe manually from the pre-release page. Promoting to stable
          # is a separate tag (v1.29.4) that doesn't carry the suffix.
          EXTRA=""
          case "$TAG" in
            *-beta.*|*-rc.*|*-alpha.*)
              EXTRA="--prerelease"
              ;;
          esac
          gh release create "$TAG" installers/* \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            $EXTRA
