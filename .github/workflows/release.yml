name: Build Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Windows binaries + wintun on Linux (no CGo needed)
  build-go-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build Windows binaries
        run: |
          mkdir -p resources
          cd daemon
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o ../resources/daemon-windows.exe ./cmd
          cd ../helper
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o ../resources/helper-windows.exe ./cmd

      - name: Download wintun.dll
        run: |
          curl -L https://www.wintun.net/builds/wintun-0.14.1.zip -o wintun.zip
          unzip wintun.zip
          cp wintun/bin/amd64/wintun.dll resources/wintun.dll

      - uses: actions/upload-artifact@v4
        with:
          name: go-binaries-windows
          path: resources/

  # Electron apps on macOS (builds darwin Go binaries natively for CGo support)
  build-clients:
    needs: build-go-windows
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/download-artifact@v4
        with:
          name: go-binaries-windows
          path: client/resources

      - name: Build macOS Go binaries
        run: |
          cd daemon
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -o ../client/resources/daemon-darwin-arm64 ./cmd
          cd ../helper
          GOOS=darwin GOARCH=arm64 go build -o ../client/resources/helper-darwin-arm64 ./cmd

      - name: Build Electron app
        run: |
          cd client
          npm install
          npm run build
          npx electron-builder --mac pkg --arm64 --publish never
          npx electron-builder --win nsis --x64 --publish never

      - name: Generate latest-mac.yml
        run: |
          cd client/release
          VERSION=$(node -p "require('../package.json').version")
          PKG="SmurovProxy-${VERSION}-arm64.pkg"
          SHA=$(shasum -a 512 "$PKG" | awk '{print $1}' | xxd -r -p | base64)
          SIZE=$(stat -f%z "$PKG")
          cat > latest-mac.yml <<YMEOF
          version: ${VERSION}
          files:
            - url: ${PKG}
              sha512: ${SHA}
              size: ${SIZE}
          path: ${PKG}
          sha512: ${SHA}
          releaseDate: '$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'
          YMEOF

      - uses: actions/upload-artifact@v4
        with:
          name: installers
          path: |
            client/release/*.pkg
            client/release/*.exe
            client/release/*.yml
            client/release/*.blockmap

  create-release:
    needs: build-clients
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: installers
          path: installers

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" installers/* --repo "${{ github.repository }}" --title "${{ github.ref_name }}"

  deploy-to-vps:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Download from GitHub Release to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            which jq >/dev/null 2>&1 || apt-get install -yqq jq
            docker exec smurov-proxy sh -c "rm -rf /data/downloads && mkdir -p /data/downloads"
            mkdir -p /tmp/release-dl && cd /tmp/release-dl
            API="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
            curl -s "$API" | jq -r '.assets[] | "\(.browser_download_url)\t\(.name)"' | while IFS=$(printf '\t') read -r url name; do
              curl -sL -o "$name" "$url"
            done
            for f in /tmp/release-dl/*; do
              docker cp "$f" smurov-proxy:/data/downloads/
            done
            rm -rf /tmp/release-dl
