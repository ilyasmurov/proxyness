name: Build Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Go binaries + wintun on Linux (1:1 minutes)
  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build Go daemons
        run: |
          mkdir -p resources
          cd daemon
          GOOS=darwin GOARCH=arm64 go build -o ../resources/daemon-darwin-arm64 ./cmd
          GOOS=darwin GOARCH=amd64 go build -o ../resources/daemon-darwin-amd64 ./cmd
          GOOS=windows GOARCH=amd64 go build -o ../resources/daemon-windows.exe ./cmd

      - name: Build Go helpers
        run: |
          cd helper
          GOOS=darwin GOARCH=arm64 go build -o ../resources/helper-darwin-arm64 ./cmd
          GOOS=darwin GOARCH=amd64 go build -o ../resources/helper-darwin-amd64 ./cmd
          GOOS=windows GOARCH=amd64 go build -o ../resources/helper-windows.exe ./cmd

      - name: Download wintun.dll
        run: |
          curl -L https://www.wintun.net/builds/wintun-0.14.1.zip -o wintun.zip
          unzip wintun.zip
          cp wintun/bin/amd64/wintun.dll resources/wintun.dll

      - uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: resources/

  # Windows installer on Linux (1:1 minutes)
  build-windows:
    needs: build-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/download-artifact@v4
        with:
          name: go-binaries
          path: client/resources

      - name: Build Windows installer
        run: |
          cd client
          npm install
          npm run build
          npx electron-builder --win nsis --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            client/release/*.exe
            client/release/*.yml
            client/release/*.blockmap

  # macOS PKG on macOS (10:1 minutes, minimized)
  build-macos:
    needs: build-go
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/download-artifact@v4
        with:
          name: go-binaries
          path: client/resources

      - name: Build macOS installers
        run: |
          cd client
          npm install
          npm run build
          npx electron-builder --mac pkg --arm64 --publish never
          npx electron-builder --mac pkg --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            client/release/*.pkg

  deploy-to-vps:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: installers

      - uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: installers

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "installers/*"
          target: /tmp/smurov-downloads
          strip_components: 1

      - name: Move files to container volume
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            docker exec smurov-proxy sh -c "rm -rf /data/downloads && mkdir -p /data/downloads"
            for f in /tmp/smurov-downloads/*; do
              docker cp "$f" smurov-proxy:/data/downloads/
            done
            rm -rf /tmp/smurov-downloads
