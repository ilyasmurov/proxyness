name: Build Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-clients:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Go daemons
        run: |
          mkdir -p client/resources
          cd daemon
          GOOS=darwin GOARCH=arm64 go build -o ../client/resources/daemon-darwin-arm64 ./cmd
          GOOS=darwin GOARCH=amd64 go build -o ../client/resources/daemon-darwin-amd64 ./cmd
          GOOS=windows GOARCH=amd64 go build -o ../client/resources/daemon-windows.exe ./cmd

      - name: Build Go helpers
        run: |
          cd helper
          GOOS=darwin GOARCH=arm64 go build -o ../client/resources/helper-darwin-arm64 ./cmd
          GOOS=darwin GOARCH=amd64 go build -o ../client/resources/helper-darwin-amd64 ./cmd
          GOOS=windows GOARCH=amd64 go build -o ../client/resources/helper-windows.exe ./cmd

      - name: Download wintun.dll for Windows TUN
        run: |
          curl -L https://www.wintun.net/builds/wintun-0.14.1.zip -o wintun.zip
          unzip wintun.zip
          cp wintun/bin/amd64/wintun.dll client/resources/wintun.dll

      - name: Build Electron app
        run: |
          cd client
          npm install
          npm run build
          npx electron-builder --mac pkg --arm64 --publish never
          npx electron-builder --mac pkg --x64 --publish never
          npx electron-builder --win nsis --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: |
            client/release/*.pkg
            client/release/*.exe
            client/release/*.yml
            client/release/*.blockmap

  deploy-to-vps:
    needs: build-clients
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers
          path: installers

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "installers/*"
          target: /tmp/smurov-downloads
          strip_components: 1

      - name: Move files to container volume
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            docker exec smurov-proxy sh -c "rm -rf /data/downloads && mkdir -p /data/downloads"
            for f in /tmp/smurov-downloads/*; do
              docker cp "$f" smurov-proxy:/data/downloads/
            done
            rm -rf /tmp/smurov-downloads
