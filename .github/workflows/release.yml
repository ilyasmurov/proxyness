name: Build Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-clients:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Go daemons
        run: |
          mkdir -p client/resources
          cd daemon
          GOOS=darwin GOARCH=arm64 go build -o ../client/resources/daemon-darwin-arm64 ./cmd
          GOOS=darwin GOARCH=amd64 go build -o ../client/resources/daemon-darwin-amd64 ./cmd
          GOOS=windows GOARCH=amd64 go build -o ../client/resources/daemon-windows.exe ./cmd

      - name: Build Electron app
        run: |
          cd client
          npm install
          npm run build
          npx electron-builder --mac dmg --arm64 --publish never
          npx electron-builder --mac dmg --x64 --publish never
          npx electron-builder --win nsis --x64 --publish never

      - name: Rename artifacts
        run: |
          cd client/release
          for f in *arm64*.dmg; do mv "$f" SmurovProxy-mac-arm64.dmg 2>/dev/null; done || true
          for f in *x64*.dmg *64*.dmg; do mv "$f" SmurovProxy-mac-x64.dmg 2>/dev/null; done || true
          for f in *.exe; do mv "$f" SmurovProxy-win-x64.exe 2>/dev/null; done || true

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "client/release/SmurovProxy-mac-arm64.dmg,client/release/SmurovProxy-mac-x64.dmg,client/release/SmurovProxy-win-x64.exe"
          target: /tmp/smurov-downloads
          strip_components: 2

      - name: Move files to container volume
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            docker exec smurov-proxy mkdir -p /data/downloads
            for f in /tmp/smurov-downloads/*.dmg /tmp/smurov-downloads/*.exe; do
              docker cp "$f" smurov-proxy:/data/downloads/
            done
            rm -rf /tmp/smurov-downloads
