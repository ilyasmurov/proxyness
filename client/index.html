<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmurovProxy</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        background: #0b0f1a;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0b0f1a;
        color: #eee;
        min-height: 100vh;
        overflow-y: auto;
      }
      #root { padding: 24px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Animation used by the StatusBar spinner (unique name to avoid collisions) */
      @keyframes smurov-spin { to { transform: rotate(360deg); } }
      /* Globe continent scroll: half of the doubled SVG width for seamless loop */
      @keyframes smurov-globe-scroll {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }
      /* Used by the LIVE / active-count indicators in the sites grid */
      @keyframes smurov-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @keyframes smurov-live-glow {
        0%, 100% { box-shadow: 0 0 3px rgba(76,175,80,0.5); }
        50%      { box-shadow: 0 0 8px rgba(76,175,80,0.9); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
