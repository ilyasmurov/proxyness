<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmurovProxy</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1a2e;
        color: #eee;
        min-height: 100vh;
      }
      #root { padding: 24px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Animation used by the StatusBar spinner (unique name to avoid collisions) */
      @keyframes smurov-spin { to { transform: rotate(360deg); } }
      /* Globe continent scroll: half of the doubled SVG width for seamless loop */
      @keyframes smurov-globe-scroll {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
