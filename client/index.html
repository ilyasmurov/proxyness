<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proxyness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
      input, textarea, [data-selectable] { user-select: text; -webkit-user-select: text; }
      body {
        font-family: 'Figtree', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: oklch(0.12 0.014 250);
        color: oklch(0.93 0.006 250);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      #root { }
      /* Prevent body scroll — all scrolling happens inside flex children */
      html, body, #root { height: 100%; overflow: hidden; }
      /* Custom scrollbar (thin, dark) */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: oklch(0.24 0.013 250); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: oklch(0.30 0.014 250); }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Animation used by the StatusBar spinner (unique name to avoid collisions) */
      @keyframes pn-spin { to { transform: rotate(360deg); } }
      /* Globe continent scroll: half of the doubled SVG width for seamless loop */
      @keyframes pn-globe-scroll {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }
      /* Used by the LIVE / active-count indicators in the sites grid */
      @keyframes pn-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @keyframes pn-live-glow {
        0%, 100% { box-shadow: 0 0 3px rgba(76,175,80,0.5); }
        50%      { box-shadow: 0 0 8px rgba(76,175,80,0.9); }
      }
      /* StatusBar entrance: dot → vertical → horizontal */
      @keyframes pn-bar-dot {
        0%   { transform: scale(0); opacity: 0; border-radius: 50%; width: 1px; height: 1px; padding: 0; }
        100% { transform: scale(1); opacity: 1; border-radius: 50%; width: 1px; height: 1px; padding: 0; }
      }
      @keyframes pn-bar-vertical {
        0%   { width: 1px; height: 1px; border-radius: 50%; padding: 0; }
        100% { width: 1px; height: 48px; border-radius: 10px; padding: 0; }
      }
      @keyframes pn-bar-expand {
        0%   { width: 1px; height: 48px; padding: 0; }
        100% { width: 100%; height: 48px; padding: 12px 16px; }
      }
      /* Letter-by-letter blur fade */
      @keyframes pn-letter-in {
        from { opacity: 0; filter: blur(4px); transform: translateY(4px); }
        to   { opacity: 1; filter: blur(0); transform: translateY(0); }
      }
      @keyframes pn-fade-in {
        from { opacity: 0; transform: scale(0.8); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes pn-fade-only {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes pn-fade-out {
        from { opacity: 1; }
        to   { opacity: 0; }
      }
      @keyframes pn-backdrop-in {
        from { backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); background: rgba(0,0,0,0); }
        to   { backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); background: rgba(0,0,0,0.5); }
      }
      /* Blur resolve animations */
      @keyframes pn-blur-bg    { from{opacity:0;filter:blur(20px) brightness(0.1)} to{opacity:1;filter:blur(0) brightness(0.25)} }
      @keyframes pn-blur-heavy { from{opacity:0;filter:blur(12px);transform:translateY(8px)} to{opacity:1;filter:blur(0);transform:translateY(0)} }
      @keyframes pn-blur-med   { from{opacity:0;filter:blur(6px);transform:translateY(5px)} to{opacity:1;filter:blur(0);transform:translateY(0)} }
      @keyframes pn-blur-light { from{opacity:0;filter:blur(4px);transform:translateY(3px)} to{opacity:1;filter:blur(0);transform:translateY(0)} }
      @keyframes pn-blur-fade  { from{opacity:0;filter:blur(3px)} to{opacity:1;filter:blur(0)} }
      @keyframes pn-blur-dot   { from{opacity:0;transform:scale(0)} to{opacity:1;transform:scale(1)} }
      @keyframes pn-blur-badge { from{opacity:0;filter:blur(4px);transform:scale(0.8)} to{opacity:1;filter:blur(0);transform:scale(1)} }
      @keyframes pn-blur-row   { from{opacity:0;filter:blur(4px);transform:translateX(-6px)} to{opacity:1;filter:blur(0);transform:translateX(0)} }
      @keyframes pn-tab-line   { from{transform:scaleX(0)} to{transform:scaleX(1)} }
      /* Ghost eye blink: open most of the time, quick blink every ~2s */
      @keyframes pn-blink {
        0%, 38% { transform: scaleY(1); }
        40%     { transform: scaleY(0.08); }
        44%, 100% { transform: scaleY(1); }
      }
      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
