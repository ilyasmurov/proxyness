<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmurovProxy</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0b0f1a;
        color: #eee;
        min-height: 100vh;
      }
      #root { }
      /* Prevent body scroll — all scrolling happens inside flex children */
      html, body, #root { height: 100%; overflow: hidden; }
      /* Custom scrollbar (thin, dark, macOS-like on all platforms) */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Animation used by the StatusBar spinner (unique name to avoid collisions) */
      @keyframes smurov-spin { to { transform: rotate(360deg); } }
      /* Globe continent scroll: half of the doubled SVG width for seamless loop */
      @keyframes smurov-globe-scroll {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }
      /* Used by the LIVE / active-count indicators in the sites grid */
      @keyframes smurov-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @keyframes smurov-live-glow {
        0%, 100% { box-shadow: 0 0 3px rgba(76,175,80,0.5); }
        50%      { box-shadow: 0 0 8px rgba(76,175,80,0.9); }
      }
      /* StatusBar entrance: dot → vertical → horizontal */
      @keyframes smurov-bar-dot {
        0%   { transform: scale(0); opacity: 0; border-radius: 50%; width: 1px; height: 1px; padding: 0; }
        100% { transform: scale(1); opacity: 1; border-radius: 50%; width: 1px; height: 1px; padding: 0; }
      }
      @keyframes smurov-bar-vertical {
        0%   { width: 1px; height: 1px; border-radius: 50%; padding: 0; }
        100% { width: 1px; height: 48px; border-radius: 10px; padding: 0; }
      }
      @keyframes smurov-bar-expand {
        0%   { width: 1px; height: 48px; padding: 0; }
        100% { width: 100%; height: 48px; padding: 12px 16px; }
      }
      /* Letter-by-letter blur fade */
      @keyframes smurov-letter-in {
        from { opacity: 0; filter: blur(4px); transform: translateY(4px); }
        to   { opacity: 1; filter: blur(0); transform: translateY(0); }
      }
      @keyframes smurov-fade-in {
        from { opacity: 0; transform: scale(0.8); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes smurov-fade-only {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes smurov-fade-out {
        from { opacity: 1; }
        to   { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
